services:
  tasktracker-db-prod:
    image: postgres:17
    container_name: tasktracker-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TASKTRACKER_POSTGRES_DB}
      POSTGRES_USER: ${TASKTRACKER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TASKTRACKER_POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${TASKTRACKER_POSTGRES_HOST_PORT}:5432"
    volumes:
      - tasktracker_postgres_prod_data:/var/lib/postgresql/data
    networks:
      - default

  tasktracker-api-prod:
    build:
      context: .
      dockerfile: TaskTracker.Api/Dockerfile
    container_name: tasktracker-api-prod
    restart: unless-stopped
    depends_on:
      - tasktracker-db-prod
    environment:
      ASPNETCORE_ENVIRONMENT: ${TASKTRACKER_ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${TASKTRACKER_API_URLS}
      ConnectionStrings__TaskTrackerDb: Host=tasktracker-db-prod;Port=5432;Database=${TASKTRACKER_POSTGRES_DB};Username=${TASKTRACKER_POSTGRES_USER};Password=${TASKTRACKER_POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${TASKTRACKER_API_HOST_PORT}:8080"
    networks:
      - default
      - steven_web

  tasktracker-ui-prod:
    build:
      context: .
      dockerfile: TaskTracker.Ui/Dockerfile
    container_name: tasktracker-ui-prod
    restart: unless-stopped
    depends_on:
      - tasktracker-api-prod
    ports:
      - "127.0.0.1:${TASKTRACKER_UI_HOST_PORT}:80"
    networks:
      - default
      - steven_web

volumes:
  tasktracker_postgres_prod_data:

networks:
  steven_web:
    external: true